<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarrazo inmobiliaria — Asistente Virtual</title>
  <meta name="description" content="Asistente virtual de Tarrazo inmobiliaria. Pregúntanos lo que necesites." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: color-mix(in srgb, #2563eb 80%, black);
      --bg: #f0f4f8;
      --chat-bg: #ffffff;
      --user-bubble: #2563eb;
      --bot-bubble: #e8edf3;
      --text: #1a202c;
      --text-muted: #718096;
      --radius: 18px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      overflow: hidden; /* Prevent body scroll if iframe handles it */
    }
    .background-iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      z-index: 0;
    }
    .chat-wrapper, .chat-toggle-btn {
      /* Ensure chat stays above iframe */
      z-index: 1000;
    }
    .chat-wrapper {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 100%;
      max-width: 400px;
      display: none;
      flex-direction: column;
      height: min(650px, 80vh);
      background: var(--chat-bg);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }
    .chat-wrapper.open { display: flex; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .chat-toggle-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 28px;
      cursor: pointer;
      box-shadow: var(--shadow);
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .chat-toggle-btn:hover { transform: scale(1.05); }
    /* Header */
    .chat-header {
      background: var(--primary);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-avatar {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-info { flex: 1; }
    .header-name { font-weight: 600; font-size: 16px; }
    .header-status {
      font-size: 12px;
      opacity: 0.85;
      display: flex; align-items: center; gap: 5px;
    }
    .status-dot {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
    }
    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 2px; }
    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message-row.user { flex-direction: row-reverse; }
    .message-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }
    .message-row.user .message-wrapper { align-items: flex-end; }
    .bubble {
      padding: 10px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .bubble.bot {
      background: var(--bot-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble-time {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      margin-bottom: 2px;
    }
    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: flex-end;
      gap: 8px;
    }
    .typing-indicator.visible { display: flex; }
    .typing-bubble {
      background: var(--bot-bubble);
      padding: 12px 16px;
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      display: flex; gap: 4px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 100% { opacity: 0.3; transform: scale(0.85); }
      50%       { opacity: 1;   transform: scale(1); }
    }
    /* Input */
    .chat-footer {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
      max-height: 100px;
      overflow-y: auto;
    }
    .chat-input:focus { border-color: var(--primary); }
    .send-btn {
      width: 42px; height: 42px;
      background: var(--primary);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--primary-dark); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn svg { fill: #fff; width: 18px; height: 18px; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<iframe class="background-iframe" src="https://www.tarrazoinmobiliaria.com/" title="Fondo"></iframe>

<button id="chatToggle" class="chat-toggle-btn"><img src='https://www.tarrazoinmobiliaria.com/crm/pages/agencies/tarrazo/assets/favicon.ico' style='width:100%; height:100%; border-radius:50%; object-fit:cover;'></button>

<div class="chat-wrapper" id="chatWrapper">
  <div class="chat-header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <div class="header-name">Tarrazo inmobiliaria</div>
      <div class="header-status">
        <span class="status-dot"></span> Asistente virtual activo
      </div>
    </div>
  </div>

  <div class="chat-messages" id="messages">
    <div class="message-row">
      <div class="message-wrapper">
        <div class="bubble bot">¡Hola! Soy el asistente virtual de <strong>Tarrazo inmobiliaria</strong>. ¿En qué puedo ayudarte hoy?</div>
      </div>
    </div>
  </div>

  <div class="typing-indicator" id="typing">
    <div class="typing-bubble">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </div>

  <div class="chat-footer">
    <textarea
      id="input"
      class="chat-input"
      placeholder="Escribe tu pregunta..."
      rows="1"
      autocomplete="off"
    ></textarea>
    <button class="send-btn" id="sendBtn" title="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const chatWrapper= document.getElementById('chatWrapper');
  const chatToggle = document.getElementById('chatToggle');
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const typingEl   = document.getElementById('typing');
  const history    = [];

  chatToggle.addEventListener('click', () => {
    chatWrapper.classList.toggle('open');
    if (chatWrapper.classList.contains('open')) {
        chatToggle.innerHTML = '<span style="font-size:24px;color:white">✕</span>';
        inputEl.focus();
    } else {
        chatToggle.innerHTML = `<img src='https://www.tarrazoinmobiliaria.com/crm/pages/agencies/tarrazo/assets/favicon.ico' style='width:100%; height:100%; border-radius:50%; object-fit:cover;'>`;
    }
  });

  function getTime() {
    return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(role, text) {
    const row = document.createElement('div');
    row.className = `message-row ${role === 'user' ? 'user' : ''}`;
    const time = document.createElement('div');
    time.className = 'bubble-time';
    time.textContent = getTime();
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role === 'user' ? 'user' : 'bot'}`;
    bubble.textContent = text;
    const wrapper = document.createElement('div');
    wrapper.className = 'message-wrapper';
    wrapper.appendChild(bubble);
    wrapper.appendChild(time);
    row.appendChild(wrapper);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    history.push({ role: 'user', content: text });
    addMessage('user', text);
    typingEl.classList.add('visible');
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      const reply = data.reply || 'Lo siento, hubo un error al procesar tu pregunta.';
      history.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);
    } catch (e) {
      addMessage('bot', 'Error de conexión. Por favor, inténtalo de nuevo.');
    } finally {
      typingEl.classList.remove('visible');
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });
</script>
</body>
</html>
